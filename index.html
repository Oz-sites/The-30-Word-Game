<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חידון המילים באנגלית - עוז וברק טייבלום</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap');

* {
    box-sizing: border-box;
    font-family: 'Rubik', sans-serif;
}

body {
    margin: 0;
    padding: 20px 0;
    background: linear-gradient(270deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
    background-size: 400% 400%;
    animation: rainbowBg 8s ease infinite;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    overflow-y: auto;
}

@keyframes rainbowBg {
    0% { background-position: 0% 50% }
    50% { background-position: 100% 50% }
    100% { background-position: 0% 50% }
}

#app-container {
    background-color: rgba(255, 255, 255, 0.95);
    width: 95%;
    max-width: 750px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    padding: 40px;
    text-align: center;
    position: relative;
    border: 5px solid #3742fa;
    animation: containerPulse 3s infinite alternate;
    overflow: hidden;
}

@keyframes containerPulse {
    0% { transform: scale(1); border-color: #3742fa; }
    100% { transform: scale(1.01); border-color: #ff4757; }
}

h1 {
    color: #ff4757;
    font-size: 48px;
    margin-bottom: 10px;
    text-shadow: 3px 3px 0px #ffeaa7;
    animation: titleBounce 1s infinite alternate;
}

@keyframes titleBounce {
    0% { transform: translateY(0) rotate(-1deg) scale(1); }
    100% { transform: translateY(-5px) rotate(1deg) scale(1.05); color: #ff007f; }
}

.credits {
    font-size: 20px;
    color: #fff;
    background: #ff4757;
    display: inline-block;
    padding: 8px 20px;
    border-radius: 30px;
    margin-bottom: 30px;
    font-weight: 900;
    border: 3px dashed #ffeaa7;
    animation: spinSlow 6s linear infinite;
}

@keyframes spinSlow {
    0% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
    100% { transform: rotate(-2deg); }
}

.screen {
    display: none;
}

.active-screen {
    display: block;
    animation: explodeIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}

@keyframes explodeIn {
    0% { opacity: 0; transform: scale(0.5) rotate(15deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

.action-buttons {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    margin-top: 10px;
    margin-bottom: 30px;
}

.btn-primary {
    background: #ff4757;
    color: white;
    border: 4px solid #3742fa;
    padding: 15px 50px;
    font-size: 32px;
    font-weight: 900;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 0px #3742fa;
    transition: all 0.2s;
    animation: extremePulse 1.5s infinite;
}

@keyframes extremePulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05) rotate(1deg); }
    100% { transform: scale(1); }
}

.btn-primary:active {
    transform: translateY(8px);
    box-shadow: 0 0px 0px #3742fa;
}

.btn-secondary {
    background: #3742fa;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 24px;
    font-weight: 900;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 6px 0px #2f3542;
    transition: all 0.2s;
}

.btn-secondary:active {
    transform: translateY(6px);
    box-shadow: 0 0px 0px #2f3542;
}

.status-bar {
    display: flex;
    justify-content: space-between;
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 900;
    margin-bottom: 30px;
    background: #ffeaa7;
    padding: 15px 25px;
    border-radius: 15px;
    border: 3px solid #ff9f43;
    color: #2f3542;
}

#score-display {
    color: #ff4757;
    font-size: clamp(22px, 5vw, 30px);
    text-shadow: 1px 1px 0px #000;
}

#quiz-content {
    width: 100%;
}

#question-text {
    font-size: clamp(35px, 6vw, 55px);
    color: #3742fa;
    margin-bottom: 35px;
    font-weight: 900;
    letter-spacing: 2px;
    direction: ltr;
    text-shadow: 2px 2px 0px #2ed573;
    word-break: break-word;
}

.options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

@media (max-width: 500px) {
    .options-grid {
        grid-template-columns: 1fr;
    }
}

.option-btn {
    background: #ffffff;
    border: 4px solid #70a1ff;
    color: #2f3542;
    padding: 15px 10px;
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 900;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 6px 0px #70a1ff;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 80px;
    line-height: 1.2;
    word-break: break-word;
}

.option-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: shine 2.5s infinite;
}

@keyframes shine {
    0% { left: -100%; }
    100% { left: 100%; }
}

.option-btn:active:not(:disabled) {
    transform: translateY(6px);
    box-shadow: 0 0px 0px #70a1ff;
}

.option-btn:disabled {
    cursor: not-allowed;
}

.correct-ans {
    background: #2ed573 !important;
    border-color: #10ac84 !important;
    color: white !important;
    box-shadow: 0 0 20px #2ed573 !important;
    animation: crazyWin 1s forwards !important;
    z-index: 10;
}

@keyframes crazyWin {
    0% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.1) rotate(10deg); }
    100% { transform: scale(1.05) rotate(360deg); }
}

.wrong-ans {
    background: #ff4757 !important;
    border-color: #c0392b !important;
    color: white !important;
    animation: dropDead 1s forwards !important;
}

@keyframes dropDead {
    0% { transform: rotate(0deg) scale(1); opacity: 1; }
    50% { transform: rotate(-10deg) scale(0.9); opacity: 0.7; }
    100% { transform: rotate(10deg) scale(0.5); opacity: 0; }
}

.body-shake {
    animation: earthquake 0.4s ease-in-out !important;
    background: #ffb8b8 !important;
}

@keyframes earthquake {
    0% { transform: translate(5px, 5px) rotate(0deg); }
    20% { transform: translate(-5px, -5px) rotate(-1deg); }
    40% { transform: translate(-5px, 5px) rotate(1deg); }
    60% { transform: translate(5px, -5px) rotate(0deg); }
    80% { transform: translate(5px, 5px) rotate(-1deg); }
    100% { transform: translate(0px, 0px) rotate(0deg); }
}

.body-party {
    animation: strobe 0.5s infinite alternate !important;
}

@keyframes strobe {
    0% { background: #b8ffb8; }
    100% { background: #b8ffff; }
}

.end-title {
    font-size: clamp(40px, 8vw, 60px);
    color: #eccc68;
    text-shadow: 3px 3px 0px #ff7f50, 6px 6px 0px #ff4757;
    margin-bottom: 20px;
    animation: zoomInOut 1.5s infinite alternate;
}

@keyframes zoomInOut {
    0% { transform: scale(1); }
    100% { transform: scale(1.1); }
}

.end-score {
    font-size: clamp(24px, 5vw, 40px);
    color: #3742fa;
    margin-bottom: 30px;
    font-weight: 900;
}

#studio-doors {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    display: flex;
    z-index: 100;
    overflow: hidden;
    border-radius: 18px;
}

.door {
    width: 50%;
    height: 100%;
    background: repeating-linear-gradient(
        45deg,
        #3742fa,
        #3742fa 20px,
        #5352ed 20px,
        #5352ed 40px
    );
    transition: transform 0.5s cubic-bezier(0.85, 0, 0.15, 1);
    display: flex;
    align-items: center;
    justify-content: center;
}

#door-left {
    transform: translateX(100%);
    border-left: 8px solid #ff4757;
    box-shadow: 10px 0 30px rgba(0,0,0,0.5);
}

#door-right {
    transform: translateX(-100%);
    border-right: 8px solid #ff4757;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5);
}

.doors-closed #door-left {
    transform: translateX(0);
}

.doors-closed #door-right {
    transform: translateX(0);
}

.save-score-container {
    background: #f1f2f6;
    padding: 20px;
    border-radius: 20px;
    border: 3px dashed #ced6e0;
    margin-bottom: 30px;
}

#player-name {
    width: 100%;
    max-width: 300px;
    padding: 15px;
    font-size: 24px;
    border: 3px solid #70a1ff;
    border-radius: 15px;
    margin-bottom: 15px;
    text-align: center;
    font-weight: 700;
    color: #2f3542;
    outline: none;
}

#player-name:focus {
    border-color: #3742fa;
    box-shadow: 0 0 10px rgba(55, 66, 250, 0.3);
}

.leaderboard-wrapper {
    margin-top: 10px;
    padding-top: 20px;
    border-top: 4px dashed #dfe4ea;
}

.leaderboard-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    margin-top: 15px;
}

.leaderboard-table th, .leaderboard-table td {
    padding: 15px;
    text-align: center;
    font-size: 22px;
    border-bottom: 2px solid #f1f2f6;
}

.leaderboard-table th {
    background: #3742fa;
    color: white;
    font-weight: 900;
}

.leaderboard-table tr:last-child td {
    border-bottom: none;
}

.leaderboard-table tr:nth-child(even) {
    background-color: #fafbfc;
}

.leaderboard-table td {
    color: #2f3542;
    font-weight: 700;
}

.rank-1 { color: #f1c40f !important; font-size: 28px !important; }
.rank-2 { color: #95a5a6 !important; font-size: 26px !important; }
.rank-3 { color: #d35400 !important; font-size: 24px !important; }
</style>
</head>
<body>

<div id="app-container">
    
    <div id="studio-doors">
        <div id="door-left" class="door"></div>
        <div id="door-right" class="door"></div>
    </div>

    <div id="start-screen" class="screen active-screen">
        <h1>חידון המילים באנגלית</h1>
        <div class="credits">נוצר על ידי עוז וברק טייבלום</div>
        <br><br>
        
        <div class="action-buttons">
            <button type="button" class="btn-primary" onclick="startGame()">שחקו עכשיו!</button>
        </div>
        
        <div class="leaderboard-wrapper">
            <h2 style="color: #3742fa;">🏆 טבלת האלופים 🏆</h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>מקום</th>
                        <th>שם</th>
                        <th>ציון</th>
                    </tr>
                </thead>
                <tbody class="leaderboard-body">
                </tbody>
            </table>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="status-bar">
            <div>שאלה: <span id="question-counter">1/30</span></div>
            <div>ציון: <span id="score-display">0</span></div>
        </div>
        <div id="quiz-content">
            <div id="question-text">Word</div>
            <div class="options-grid" id="options-container"></div>
        </div>
    </div>

    <div id="end-screen" class="screen">
        <div class="end-title">כל הכבוד!</div>
        <div class="end-score">הציון שלכם: <span id="final-score-display">0</span> מתוך 100!</div>
        
        <div class="save-score-container" id="save-section">
            <input type="text" id="player-name" placeholder="הכנס שם לשמירה..." autocomplete="off">
            <br>
            <button type="button" class="btn-secondary" style="background:#2ed573;" onclick="saveScore()">שמור לטבלת הניצחונות</button>
        </div>

        <div class="action-buttons">
            <button type="button" class="btn-primary" onclick="startGame()">שחקו שוב</button>
            <button type="button" class="btn-secondary" style="font-size: 28px;" onclick="switchScreen('start-screen')">חזרה לתפריט</button>
        </div>

        <div class="leaderboard-wrapper">
            <h2 style="color: #3742fa;">🏆 טבלת האלופים 🏆</h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>מקום</th>
                        <th>שם</th>
                        <th>ציון</th>
                    </tr>
                </thead>
                <tbody class="leaderboard-body">
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
const vocabulary = [
    { en: "Subway", he: "רכבת תחתית" },
    { en: "Supermarket", he: "סופרמרקט" },
    { en: "Swimming pool", he: "בריכת שחייה" },
    { en: "Volunteer", he: "מתנדב" },
    { en: "Vote", he: "להצביע בבחירות" },
    { en: "Society", he: "חברה" },
    { en: "Soldier", he: "חייל" },
    { en: "Railway station", he: "תחנת רכבת" },
    { en: "Technology", he: "טכנולוגיה" },
    { en: "Source (of)", he: "מקור (של)" },
    { en: "Spaceship", he: "חללית" },
    { en: "Role", he: "תפקיד" },
    { en: "Row", he: "שורה" },
    { en: "River", he: "נהר" },
    { en: "Tear", he: "דמעה" },
    { en: "Major", he: "גדול, חשוב" },
    { en: "Majority (of)", he: "מרבית, רוב" },
    { en: "Principal", he: "מנהל בית ספר" },
    { en: "Purse", he: "תיק, ארנק" },
    { en: "Push", he: "דחיפה" },
    { en: "Puzzle", he: "פאזל, חידה" },
    { en: "On one's own", he: "לבד, בעצמו" },
    { en: "On time", he: "בזמן" },
    { en: "Once in a while", he: "מדי פעם" },
    { en: "Online", he: "באינטרנט" },
    { en: "Option", he: "ברירה, אפשרות" },
    { en: "Overseas", he: "מעבר לים, בחו\"ל" },
    { en: "Participate", he: "להשתתף" },
    { en: "Particular", he: "מסוים" },
    { en: "Party", he: "מפלגה" }
];

let gameWords = [];
let currentQuestionIndex = 0;
let correctAnswersCount = 0;
let currentScorePercentage = 0;

let audioCtx = null;
let audioEnabled = true;

function initAudio() {
    if (!audioEnabled) return;
    try {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                audioCtx = new AudioContext();
            } else {
                audioEnabled = false;
                return;
            }
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().catch(() => {});
        }
    } catch (e) {
        audioEnabled = false;
    }
}

function playTone(freq, type, duration, startTime, vol) {
    if (!audioEnabled) return;
    try {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime + startTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + startTime);
        osc.stop(audioCtx.currentTime + startTime + duration);
    } catch (e) {}
}

function playSuccessSound() {
    playTone(523.25, 'sine', 0.1, 0, 0.4);
    playTone(659.25, 'sine', 0.1, 0.1, 0.4);
    playTone(783.99, 'sine', 0.1, 0.2, 0.4);
    playTone(1046.50, 'sine', 0.4, 0.3, 0.4);
}

function playFailSound() {
    playTone(150, 'sawtooth', 0.3, 0, 0.4);
    playTone(100, 'sawtooth', 0.4, 0.2, 0.4);
    playTone(50, 'sawtooth', 0.5, 0.4, 0.4);
}

function playWhooshSound() {
    playTone(300, 'sine', 0.3, 0, 0.2);
    playTone(200, 'sine', 0.3, 0.1, 0.2);
}

function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
    document.getElementById(screenId).classList.add('active-screen');
}

function shuffleArray(array) {
    let newArr = [...array];
    for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }
    return newArr;
}

function startGame() {
    try {
        initAudio();
        
        gameWords = shuffleArray(vocabulary);
        currentQuestionIndex = 0;
        correctAnswersCount = 0;
        currentScorePercentage = 0;
        
        const playerNameInput = document.getElementById('player-name');
        if (playerNameInput) playerNameInput.value = '';
        
        const saveSection = document.getElementById('save-section');
        if (saveSection) saveSection.style.display = 'block';
        
        updateScoreDisplay();
        switchScreen('game-screen');
        renderQuestion();
    } catch (e) {}
}

function renderQuestion() {
    document.body.className = '';
    
    document.getElementById('question-counter').innerText = `${currentQuestionIndex + 1}/${gameWords.length}`;
    
    const currentWord = gameWords[currentQuestionIndex];
    document.getElementById('question-text').innerText = currentWord.en;

    let options = [currentWord.he];
    while (options.length < 4) {
        const randomWord = vocabulary[Math.floor(Math.random() * vocabulary.length)].he;
        if (!options.includes(randomWord)) {
            options.push(randomWord);
        }
    }

    options = shuffleArray(options);

    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';

    options.forEach((opt) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => handleAnswer(opt, currentWord.he, btn);
        optionsContainer.appendChild(btn);
    });
}

function triggerDoorsTransition(callback) {
    const doors = document.getElementById('studio-doors');
    doors.classList.add('doors-closed');
    playWhooshSound();
    
    setTimeout(() => {
        callback();
        doors.classList.remove('doors-closed');
        playWhooshSound();
    }, 600);
}

function handleAnswer(selectedAnswer, correctAnswer, selectedBtn) {
    const allBtns = document.querySelectorAll('.option-btn');
    allBtns.forEach(btn => btn.disabled = true);

    if (selectedAnswer === correctAnswer) {
        selectedBtn.classList.add('correct-ans');
        correctAnswersCount++;
        playSuccessSound();
        document.body.classList.add('body-party');
    } else {
        selectedBtn.classList.add('wrong-ans');
        allBtns.forEach(btn => {
            if (btn.innerText === correctAnswer) {
                btn.classList.add('correct-ans');
            }
        });
        playFailSound();
        document.body.classList.add('body-shake');
    }

    currentScorePercentage = Math.round((correctAnswersCount / gameWords.length) * 100);
    updateScoreDisplay();

    setTimeout(() => {
        currentQuestionIndex++;
        if (currentQuestionIndex < gameWords.length) {
            triggerDoorsTransition(() => {
                renderQuestion();
            });
        } else {
            triggerDoorsTransition(() => {
                finishGame();
            });
        }
    }, 1200);
}

function updateScoreDisplay() {
    const scoreEl = document.getElementById('score-display');
    scoreEl.innerText = currentScorePercentage;
    scoreEl.style.transform = 'scale(1.5)';
    setTimeout(() => { scoreEl.style.transform = 'scale(1)'; }, 200);
}

function finishGame() {
    playTone(523.25, 'sine', 0.2, 0, 0.4);
    playTone(659.25, 'sine', 0.2, 0.2, 0.4);
    playTone(783.99, 'sine', 0.2, 0.4, 0.4);
    playTone(1046.50, 'sine', 0.8, 0.6, 0.4);
    document.body.className = 'body-party';
    document.getElementById('final-score-display').innerText = currentScorePercentage;
    renderLeaderboards();
    switchScreen('end-screen');
}

function getLeaderboardData() {
    let data = [];
    try {
        const stored = localStorage.getItem('englishQuizLB');
        if (stored) {
            data = JSON.parse(stored);
            if (!Array.isArray(data)) data = [];
        }
    } catch (e) {
        data = [];
    }
    return data;
}

function saveScore() {
    const nameInput = document.getElementById('player-name');
    const name = nameInput.value.trim();
