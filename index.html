<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חידון המילים הגדול - עוז וברק טייבלום</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap');

* {
    box-sizing: border-box;
    font-family: 'Rubik', sans-serif;
}

body {
    margin: 0;
    padding: 0;
    background: linear-gradient(270deg, #ff007f, #74ebd5, #9face6, #ffcc00);
    background-size: 800% 800%;
    animation: rainbowBg 5s ease infinite;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

@keyframes rainbowBg {
    0% { background-position: 0% 50% }
    50% { background-position: 100% 50% }
    100% { background-position: 0% 50% }
}

#app-container {
    background-color: rgba(255, 255, 255, 0.95);
    width: 95%;
    max-width: 800px;
    border-radius: 35px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    padding: 40px;
    text-align: center;
    position: relative;
    border: 8px solid #3742fa;
    animation: containerPulse 2s infinite alternate;
}

@keyframes containerPulse {
    0% { transform: scale(1); border-color: #3742fa; }
    100% { transform: scale(1.02); border-color: #ff4757; }
}

h1 {
    color: #ff4757;
    font-size: 60px;
    margin-bottom: 10px;
    text-shadow: 4px 4px 0px #ffeaa7, 8px 8px 0px #3742fa;
    animation: titleBounce 0.5s infinite alternate;
}

@keyframes titleBounce {
    0% { transform: translateY(0) rotate(-2deg) scale(1); }
    100% { transform: translateY(-15px) rotate(2deg) scale(1.1); color: #ff007f; }
}

.credits {
    font-size: 24px;
    color: #fff;
    background: #ff4757;
    display: inline-block;
    padding: 10px 25px;
    border-radius: 30px;
    margin-bottom: 30px;
    font-weight: 900;
    border: 4px dashed #ffeaa7;
    animation: spinSlow 4s linear infinite;
}

@keyframes spinSlow {
    0% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
    100% { transform: rotate(-5deg); }
}

.screen {
    display: none;
}

.active-screen {
    display: block;
    animation: explodeIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}

@keyframes explodeIn {
    0% { opacity: 0; transform: scale(0.1) rotate(180deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

#start-btn, #restart-btn {
    background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
    background-color: #ff4757;
    color: #3742fa;
    border: 6px solid #3742fa;
    padding: 20px 60px;
    font-size: 40px;
    font-weight: 900;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 15px 0px #3742fa;
    transition: all 0.1s;
    animation: extremePulse 1s infinite;
}

@keyframes extremePulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15) rotate(3deg); }
    100% { transform: scale(1); }
}

#start-btn:active, #restart-btn:active {
    transform: translateY(15px);
    box-shadow: 0 0px 0px #3742fa;
}

.status-bar {
    display: flex;
    justify-content: space-between;
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 30px;
    background: #ffeaa7;
    padding: 20px 30px;
    border-radius: 20px;
    border: 4px solid #ff9f43;
    color: #2f3542;
    animation: wobble 3s infinite;
}

@keyframes wobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-1deg); }
    75% { transform: rotate(1deg); }
}

#score-display {
    color: #ff4757;
    font-size: 36px;
    text-shadow: 2px 2px 0px #000;
}

#question-text {
    font-size: 65px;
    color: #3742fa;
    margin-bottom: 40px;
    font-weight: 900;
    letter-spacing: 3px;
    direction: ltr;
    text-shadow: 3px 3px 0px #2ed573;
    animation: popOut 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popOut {
    0% { transform: scale(0); opacity: 0; }
    80% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); }
}

.options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

.option-btn {
    background: #ffffff;
    border: 6px solid #70a1ff;
    color: #2f3542;
    padding: 25px;
    font-size: 28px;
    font-weight: 900;
    border-radius: 25px;
    cursor: pointer;
    box-shadow: 0 10px 0px #70a1ff;
    transition: all 0.1s;
    position: relative;
    overflow: hidden;
}

.option-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    animation: shine 2s infinite;
}

@keyframes shine {
    0% { left: -100%; }
    100% { left: 100%; }
}

.option-btn:active:not(:disabled) {
    transform: translateY(10px);
    box-shadow: 0 0px 0px #70a1ff;
}

.option-btn:disabled {
    cursor: not-allowed;
}

.correct-ans {
    background: #2ed573 !important;
    border-color: #10ac84 !important;
    color: white !important;
    box-shadow: 0 0 50px #2ed573, inset 0 0 20px #fff !important;
    animation: crazyWin 1.5s forwards !important;
    z-index: 10;
}

@keyframes crazyWin {
    0% { transform: scale(1) rotate(0deg); }
    20% { transform: scale(1.5) rotate(-15deg); }
    40% { transform: scale(1.5) rotate(15deg); }
    60% { transform: scale(1.5) rotate(-15deg); }
    80% { transform: scale(1.5) rotate(15deg); }
    100% { transform: scale(1.2) rotate(360deg); }
}

.wrong-ans {
    background: #ff4757 !important;
    border-color: #c0392b !important;
    color: white !important;
    animation: dropDead 1.5s forwards !important;
}

@keyframes dropDead {
    0% { transform: rotate(0deg); }
    20% { transform: rotate(-20deg) scale(0.8); }
    100% { transform: translateY(1000px) rotate(180deg) scale(0); opacity: 0; }
}

.body-shake {
    animation: earthquake 0.3s infinite !important;
    background: #ff0000 !important;
}

@keyframes earthquake {
    0% { transform: translate(10px, 10px) rotate(0deg); }
    10% { transform: translate(-10px, -20px) rotate(-1deg); }
    20% { transform: translate(-30px, 0px) rotate(1deg); }
    30% { transform: translate(30px, 20px) rotate(0deg); }
    40% { transform: translate(10px, -10px) rotate(1deg); }
    50% { transform: translate(-10px, 20px) rotate(-1deg); }
    60% { transform: translate(-30px, 10px) rotate(0deg); }
    70% { transform: translate(30px, 10px) rotate(-1deg); }
    80% { transform: translate(-10px, -10px) rotate(1deg); }
    90% { transform: translate(10px, 20px) rotate(0deg); }
    100% { transform: translate(0px, 0px) rotate(0deg); }
}

.body-party {
    animation: strobe 0.2s infinite !important;
}

@keyframes strobe {
    0% { background: #00ff00; }
    50% { background: #ffff00; }
    100% { background: #00ffff; }
}

.end-title {
    font-size: 70px;
    color: #eccc68;
    text-shadow: 4px 4px 0px #ff7f50, 8px 8px 0px #ff4757;
    margin-bottom: 20px;
    animation: zoomInOut 1s infinite alternate;
}

@keyframes zoomInOut {
    0% { transform: scale(1); }
    100% { transform: scale(1.2); }
}

.end-score {
    font-size: 50px;
    color: #3742fa;
    margin-bottom: 40px;
    font-weight: 900;
}
</style>
</head>
<body>

<div id="app-container">
    
    <div id="start-screen" class="screen active-screen">
        <h1>חידון המילים המטורף!</h1>
        <div class="credits">נוצר על ידי עוז וברק טייבלום</div>
        <br><br>
        <button id="start-btn" onclick="startGame()">שחקו עכשיו!!!</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="status-bar">
            <div>שאלה: <span id="question-counter">1/30</span></div>
            <div>נקודות: <span id="score-display">0</span></div>
        </div>
        <div id="question-text">Word</div>
        <div class="options-grid" id="options-container"></div>
    </div>

    <div id="end-screen" class="screen">
        <div class="end-title">מטורף!!!</div>
        <div class="end-score">השגתם <span id="final-score-display">0</span> נקודות!!!</div>
        <button id="restart-btn" onclick="startGame()">עוד פעם!!!</button>
    </div>

</div>

<script>
const vocabulary = [
    { en: "Subway", he: "רכבת תחתית" },
    { en: "Supermarket", he: "סופרמרקט" },
    { en: "Swimming pool", he: "בריכת שחייה" },
    { en: "Volunteer", he: "מתנדב" },
    { en: "Vote", he: "להצביע בבחירות" },
    { en: "Society", he: "חברה" },
    { en: "Soldier", he: "חייל" },
    { en: "Railway station", he: "תחנת רכבת" },
    { en: "Technology", he: "טכנולוגיה" },
    { en: "Source (of)", he: "מקור (של)" },
    { en: "Spaceship", he: "חללית" },
    { en: "Role", he: "תפקיד" },
    { en: "Row", he: "שורה" },
    { en: "River", he: "נהר" },
    { en: "Tear", he: "דמעה" },
    { en: "Major", he: "גדול, חשוב" },
    { en: "Majority (of)", he: "מרבית, רוב" },
    { en: "Principal", he: "מנהל בית ספר" },
    { en: "Purse", he: "תיק, ארנק" },
    { en: "Push", he: "דחיפה" },
    { en: "Puzzle", he: "פאזל, חידה" },
    { en: "On one's own", he: "לבד, בעצמו" },
    { en: "On time", he: "בזמן" },
    { en: "Once in a while", he: "מדי פעם" },
    { en: "Online", he: "באינטרנט" },
    { en: "Option", he: "ברירה, אפשרות" },
    { en: "Overseas", he: "מעבר לים, בחו\"ל" },
    { en: "Participate", he: "להשתתף" },
    { en: "Particular", he: "מסוים" },
    { en: "Party", he: "מפלגה" }
];

let gameWords = [];
let currentQuestionIndex = 0;
let score = 0;
const pointsPerQuestion = 1000;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let bgmInterval;

function playTone(freq, type, duration, startTime, vol) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime + startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + startTime);
    osc.stop(audioCtx.currentTime + startTime + duration);
}

const bgmNotes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 261.63, 196.00];
let bgmIndex = 0;

function stepBGM() {
    playTone(bgmNotes[bgmIndex], 'square', 0.15, 0, 0.05);
    bgmIndex = (bgmIndex + 1) % bgmNotes.length;
}

function startBGM() {
    stopBGM();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    bgmInterval = setInterval(stepBGM, 150);
}

function stopBGM() {
    if (bgmInterval) {
        clearInterval(bgmInterval);
        bgmInterval = null;
    }
}

function playSuccessSound() {
    playTone(523.25, 'sine', 0.1, 0, 0.5);
    playTone(659.25, 'sine', 0.1, 0.1, 0.5);
    playTone(783.99, 'sine', 0.1, 0.2, 0.5);
    playTone(1046.50, 'sine', 0.4, 0.3, 0.5);
}

function playFailSound() {
    playTone(150, 'sawtooth', 0.3, 0, 0.5);
    playTone(100, 'sawtooth', 0.5, 0.2, 0.6);
    playTone(50, 'sawtooth', 0.7, 0.4, 0.7);
}

function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
    document.getElementById(screenId).classList.add('active-screen');
}

function shuffleArray(array) {
    let newArr = [...array];
    for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }
    return newArr;
}

function startGame() {
    startBGM();
    gameWords = shuffleArray(vocabulary);
    currentQuestionIndex = 0;
    score = 0;
    updateScoreDisplay();
    switchScreen('game-screen');
    renderQuestion();
}

function renderQuestion() {
    document.body.className = '';
    const qText = document.getElementById('question-text');
    qText.style.animation = 'none';
    void qText.offsetWidth;
    qText.style.animation = 'popOut 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

    document.getElementById('question-counter').innerText = `${currentQuestionIndex + 1}/${gameWords.length}`;
    
    const currentWord = gameWords[currentQuestionIndex];
    qText.innerText = currentWord.en;

    let options = [currentWord.he];
    while (options.length < 4) {
        const randomWord = vocabulary[Math.floor(Math.random() * vocabulary.length)].he;
        if (!options.includes(randomWord)) {
            options.push(randomWord);
        }
    }

    options = shuffleArray(options);

    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';

    options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.style.animation = `popOut 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${index * 0.1}s backwards`;
        btn.onclick = () => handleAnswer(opt, currentWord.he, btn);
        optionsContainer.appendChild(btn);
    });
}

function handleAnswer(selectedAnswer, correctAnswer, selectedBtn) {
    const allBtns = document.querySelectorAll('.option-btn');
    allBtns.forEach(btn => btn.disabled = true);

    if (selectedAnswer === correctAnswer) {
        selectedBtn.classList.add('correct-ans');
        score += pointsPerQuestion;
        updateScoreDisplay();
        playSuccessSound();
        document.body.classList.add('body-party');
    } else {
        selectedBtn.classList.add('wrong-ans');
        allBtns.forEach(btn => {
            if (btn.innerText === correctAnswer) {
                btn.classList.add('correct-ans');
            }
        });
        playFailSound();
        document.body.classList.add('body-shake');
    }

    setTimeout(() => {
        currentQuestionIndex++;
        if (currentQuestionIndex < gameWords.length) {
            renderQuestion();
        } else {
            finishGame();
        }
    }, 2000);
}

function updateScoreDisplay() {
    const scoreEl = document.getElementById('score-display');
    scoreEl.innerText = score;
    scoreEl.style.transform = 'scale(2)';
    setTimeout(() => { scoreEl.style.transform = 'scale(1)'; }, 300);
}

function finishGame() {
    stopBGM();
    playTone(523.25, 'sine', 0.2, 0, 0.5);
    playTone(659.25, 'sine', 0.2, 0.2, 0.5);
    playTone(783.99, 'sine', 0.2, 0.4, 0.5);
    playTone(1046.50, 'sine', 0.8, 0.6, 0.5);
    document.body.className = 'body-party';
    document.getElementById('final-score-display').innerText = score;
    switchScreen('end-screen');
}
</script>

</body>
</html>
